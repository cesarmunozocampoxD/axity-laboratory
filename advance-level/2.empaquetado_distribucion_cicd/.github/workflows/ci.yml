name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    name: Lint, Type Check, and Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          virtualenvs-create: true
          virtualenvs-in-project: true
          installer-parallel: true

      - name: Install dependencies
        run: poetry install --no-interaction --no-root

      - name: Lint
        run: poetry run ruff check src/ tests/

      - name: Type check
        run: poetry run mypy src/

      - name: Test
        shell: bash
        run: |
          TEST_FILES=$(find tests -type f \( -name 'test_*.py' -o -name '*_test.py' \) | wc -l)
          if [ "$TEST_FILES" -eq 0 ]; then
            echo "No test files found in tests/. Skipping pytest."
            exit 0
          fi

          poetry run pytest tests/ --cov=empaquetado_distribucion_cicd --cov-report=term-missing
